<!DOCTYPE html>
<html>
<head><title>Форма автомобиля</title></head>
<body>
    <h1>{% if form.instance.pk %}Редактировать{% else %}Добавить{% endif %} автомобиль</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
    </form>
    <a href="{% url 'home' %}">Главная</a> | <a href="{% url 'car_list' %}">Назад к списку</a>
</body>
</html>
