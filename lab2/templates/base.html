{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Booking{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style_base.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'hotels_list' %}">MyBooking</a>
    <div>
      <a class="nav-link d-inline me-3" href="{% url 'hotels_list' %}">Отели</a>
      <a class="nav-link d-inline me-3" href="{% url 'rooms_list' %}">Номера</a>
      <a class="nav-link d-inline" href="{% url 'guests_last_month' %}">Постояльцы</a>
    </div>
    <div>
      {% if user.is_authenticated %}
        <span class="me-2">{{ user.username }}</span>
        <a class="btn btn-sm btn-outline-secondary" href="{% url 'my_reservations' %}">Мои брони</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="btn btn-sm btn-outline-danger">Выйти</button>
        </form>
    {% else %}
        <a class="btn btn-sm btn-primary me-1" href="{% url 'login' %}">Войти</a>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'register' %}">Регистрация</a>
    {% endif %}
    </div>
  </div>
</nav>

<main class="container">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
